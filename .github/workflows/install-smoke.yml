name: Install smoke

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to smoke-test (e.g. v0.2.0-rc2)'
        required: true
        type: string

# When triggered by a release, the version is github.event.release.tag_name.
# When triggered manually, use the dispatch input.
# Concurrency: don't run multiple smoke runs for the same version simultaneously.
concurrency:
  group: install-smoke-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Install + verify (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14
          - os: windows
            runner: windows-2022

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Expected version string is the tag without the leading 'v'.
          EXPECTED="${VERSION#v}"
          echo "expected=${EXPECTED}" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing version: ${VERSION} (expected output: ridge ${EXPECTED})"

      # ── Prerequisites: install scripts verify these and exit if missing ──
      - name: Install Rust toolchain (prerequisite check)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install Erlang/OTP (prerequisite check)
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"

      # ── Run install script (will download binaries from release) ──
      # Download first, then execute with `bash -x` so every command is
      # echoed to the log. Pipe-to-bash hides errors when curl returns an
      # empty body or install.sh exits early (no `set -o pipefail` in the
      # GitHub Actions step shell), and prior runs showed install.sh
      # producing ZERO output — bash -x makes the silent failure visible.
      - name: Run install script (Unix)
        if: matrix.os != 'windows'
        env:
          RIDGE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -o pipefail
          INSTALLER=/tmp/ridge-install.sh
          echo "Fetching installer from raw.githubusercontent.com ..."
          curl -fsSL "https://raw.githubusercontent.com/ridge-lang/ridge/${{ github.sha }}/tools/install/install.sh" -o "$INSTALLER"
          echo "Installer size: $(wc -c < "$INSTALLER") bytes"
          echo "First 3 lines of installer:"
          head -3 "$INSTALLER"
          echo "--- begin bash -x trace ---"
          bash -x "$INSTALLER" 2>&1
          rc=$?
          echo "--- end bash -x trace (exit=$rc) ---"
          echo "Contents of \$HOME/.cargo/bin after install:"
          ls -la "$HOME/.cargo/bin/" || echo "(directory does not exist)"
          exit $rc

      - name: Run install script (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          RIDGE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $url = "https://raw.githubusercontent.com/ridge-lang/ridge/${{ github.sha }}/tools/install/install.ps1"
          & ([scriptblock]::Create((iwr -useb $url).Content))

      # ── Ensure install location is on PATH for subsequent steps ──
      # install.sh extracts to $HOME/.cargo/bin by default; the setup-rust
      # action usually adds this to PATH, but make it explicit so the verify
      # steps reliably find the binaries on every runner.
      - name: Add install dir to PATH (Unix)
        if: matrix.os != 'windows'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add install dir to PATH (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin

      # ── Verify both binaries: pipe output through grep instead of $() ──
      # `$()` capture of native .exe output is flaky on Windows Git Bash
      # (output sometimes arrives empty). Direct pipe to grep -Fxq is
      # robust across all platforms and matches the EXACT expected line.
      - name: Verify ridge --version output
        shell: bash
        run: |
          EXPECTED="ridge ${{ steps.ver.outputs.expected }}"
          echo "Checking that 'ridge --version' prints exactly: $EXPECTED"
          ridge --version
          if ! ridge --version 2>&1 | grep -Fxq "$EXPECTED"; then
            echo "::error::ridge --version did not print the expected line '$EXPECTED'"
            exit 1
          fi
          echo "ridge --version: matches expected ✓"

      - name: Verify ridge-lsp --version output
        shell: bash
        run: |
          EXPECTED="ridge-lsp ${{ steps.ver.outputs.expected }}"
          echo "Checking that 'ridge-lsp --version' prints exactly: $EXPECTED"
          ridge-lsp --version
          if ! ridge-lsp --version 2>&1 | grep -Fxq "$EXPECTED"; then
            echo "::error::ridge-lsp --version did not print the expected line '$EXPECTED'"
            exit 1
          fi
          echo "ridge-lsp --version: matches expected ✓"

      # ── End-to-end smoke: scaffold + build a Ridge project ──
      - name: Scaffold + build smoke project
        shell: bash
        run: |
          ridge new smoke-test
          cd smoke-test
          ridge build
