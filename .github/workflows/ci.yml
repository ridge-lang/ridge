name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14
          - os: windows
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        # GitHub-hosted Linux runners ship with ~25 GB of preinstalled
        # tooling (Android SDK, .NET, GHC, CodeQL, Boost) that Ridge does
        # not use. Rust + OTP + the cargo cache push past the remaining
        # headroom and the runner aborts with "No space left on device"
        # before the build step. Reclaim the unused space up front.
        # macOS and Windows runners have headroom; the bundled tooling
        # paths are also Linux-specific.
        if: matrix.os == 'linux'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --no-fail-fast --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
