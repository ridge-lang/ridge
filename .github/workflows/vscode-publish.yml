name: VS Code extension

on:
  pull_request:
    paths:
      - 'tools/vscode-ridge/**'
      - '.github/workflows/vscode-publish.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to the VS Code Marketplace (requires the VSCE_PAT secret).'
        type: boolean
        default: false
      publish-openvsx:
        description: 'Publish to Open VSX (requires the OVSX_PAT secret).'
        type: boolean
        default: false
      pre-release:
        description: 'Marketplace pre-release channel. Open VSX has no separate pre-release channel and ignores this flag.'
        type: boolean
        default: false

# Serialize runs that target the same branch/tag so two dispatches against the
# same ref do not race a Marketplace publish.
concurrency:
  group: vscode-publish-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Bundle + package
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      vsix: ${{ steps.meta.outputs.vsix }}
    defaults:
      run:
        working-directory: tools/vscode-ridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          VSIX="vscode-ridge-${VERSION}.vsix"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix=${VSIX}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"
          echo "Artifact name:   ${VSIX}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.1.1 (the packageManager pin in tools/vscode-ridge/package.json)
          # requires Node >= 22.13; Node 20 fails to load with
          # ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite.
          node-version: '22'

      - name: Activate pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle extension
        run: pnpm run bundle

      - name: Package .vsix
        run: pnpm dlx @vscode/vsce package --no-dependencies --out "${{ steps.meta.outputs.vsix }}"

      - name: Inspect .vsix
        shell: bash
        run: |
          ls -la "${{ steps.meta.outputs.vsix }}"
          pnpm dlx @vscode/vsce ls --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.vsix }}
          path: tools/vscode-ridge/${{ steps.meta.outputs.vsix }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to VS Code Marketplace
    needs: package
    # Only publish when the workflow was dispatched manually with the
    # `publish` input set to true. PRs and the default dispatch run produce
    # the .vsix artifact but never push it to the Marketplace.
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/vscode-ridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.1.1 (the packageManager pin in tools/vscode-ridge/package.json)
          # requires Node >= 22.13; Node 20 fails to load with
          # ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite.
          node-version: '22'

      - name: Activate pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.vsix }}
          path: tools/vscode-ridge

      - name: Verify VSCE_PAT is configured
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::VSCE_PAT secret is not configured for this repository."
            echo "Add it under Settings > Secrets and variables > Actions > New repository secret."
            echo "The token must have Marketplace: Manage scope on All accessible organizations."
            exit 1
          fi
          echo "VSCE_PAT is set (length: ${#VSCE_PAT})"

      - name: Publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          FLAGS=(--no-dependencies --packagePath "${{ needs.package.outputs.vsix }}")
          if [ "${{ inputs.pre-release }}" = "true" ]; then
            FLAGS+=(--pre-release)
          fi
          pnpm dlx @vscode/vsce publish "${FLAGS[@]}"
          echo "Published ridge-lang.vscode-ridge v${{ needs.package.outputs.version }}"
          echo "Listing: https://marketplace.visualstudio.com/items?itemName=ridge-lang.vscode-ridge"

  publish-openvsx:
    name: Publish to Open VSX
    needs: package
    # Only publish when dispatched manually with `publish-openvsx` set to true.
    # PRs and the default dispatch produce the .vsix artifact but never push it.
    if: github.event_name == 'workflow_dispatch' && inputs.publish-openvsx == true
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/vscode-ridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.1.1 needs Node >= 22.13; Node 20 fails with
          # ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite.
          node-version: '22'

      - name: Activate pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.vsix }}
          path: tools/vscode-ridge

      - name: Verify OVSX_PAT is configured
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "::error::OVSX_PAT secret is not configured for this repository."
            echo "Add it under Settings > Secrets and variables > Actions > New repository secret."
            echo "Get the token from https://open-vsx.org/user-settings/tokens (sign in with GitHub, then create a new access token)."
            echo "The ridge-lang namespace must be claimed first under https://open-vsx.org/user-settings/namespaces."
            exit 1
          fi
          echo "OVSX_PAT is set (length: ${#OVSX_PAT})"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          pnpm dlx ovsx publish "${{ needs.package.outputs.vsix }}"
          echo "Published ridge-lang.vscode-ridge v${{ needs.package.outputs.version }} to Open VSX"
          echo "Listing: https://open-vsx.org/extension/ridge-lang/vscode-ridge"

  tag:
    name: Tag vscode-v<version>
    needs: [package, publish, publish-openvsx]
    # Tag only when the .vsix was packaged AND at least one publish job
    # actually pushed it. PR builds and dispatches with both publish
    # flags unchecked produce no tag. `always()` is needed so this job
    # runs even when one of the two publish jobs is skipped.
    if: |
      always() &&
      needs.package.result == 'success' &&
      (needs.publish.result == 'success' || needs.publish-openvsx.result == 'success')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        env:
          VERSION: ${{ needs.package.outputs.version }}
        shell: bash
        run: |
          TAG="vscode-v${VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on the remote; skipping."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG}" -m "Ridge VS Code extension ${VERSION}"
          git push origin "${TAG}"

          echo "Pushed tag ${TAG} pointing at ${GITHUB_SHA}"
