name: Install smoke

on:
  release:
    types: [published, prereleased]
  pull_request:
    paths:
      - 'tools/install/**'
      - '.github/workflows/install-smoke.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to checkout install scripts from'
        required: false
        default: 'main'
        type: string

# Concurrency: serialize runs that target the same ref so concurrent PR pushes
# (or repeated dispatches against the same branch) don't trample each other.
# For release events the head ref is the tag; for pull_request it's the PR
# head ref; for workflow_dispatch it falls back to the dispatch input.
concurrency:
  group: install-smoke-${{ github.event.release.tag_name || github.head_ref || inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Install + verify (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14
          - os: windows
            runner: windows-2022

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On release events the version IS the tag being published.
          # On pull_request and workflow_dispatch we smoke-test the latest
          # published release, since that's the binary set the install
          # scripts on the candidate ref will be told to fetch.
          #
          # Note: `releases/latest` excludes prereleases and drafts by
          # design of the GitHub API. Every release published so far is a
          # release candidate (rc1..rc5) and therefore flagged as a
          # prerelease, so `releases/latest` returns 404. List all
          # releases instead and pick the most recent non-draft entry --
          # GitHub returns releases ordered descending by created_at, so
          # the first match is the latest published (pre)release.
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="$(gh api repos/ridge-lang/ridge/releases --jq '[.[] | select(.draft == false)][0].tag_name')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Expected version string is the tag without the leading 'v'.
          EXPECTED="${VERSION#v}"
          echo "expected=${EXPECTED}" >> "$GITHUB_OUTPUT"
          echo "Smoke-testing version: ${VERSION} (expected output: ridge ${EXPECTED})"

      - name: Resolve install-script ref
        id: src
        shell: bash
        run: |
          # For pull_request events, github.sha points at the virtual merge
          # commit (test merge between PR head and base), which raw.github
          # usercontent.com may not serve reliably. Use the PR head SHA
          # instead -- it's always pushed to the source branch and raw serves
          # it consistently. This is the pattern used by rustup/cargo/deno.
          # For workflow_dispatch we honor the user-supplied ref so manual
          # runs can target any branch / tag / SHA. For release events,
          # github.sha is the tag commit and is correct.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            REF="${{ github.event.pull_request.head.sha }}"
          else
            REF="${{ github.sha }}"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Install scripts will be fetched from ref: ${REF}"

      # ── Prerequisites: install scripts verify these and exit if missing ──
      - name: Install Rust toolchain (prerequisite check)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install Erlang/OTP (prerequisite check)
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"

      # ── Run install script (will download binaries from release) ──
      # Download first, then execute with `bash -x` so every command is
      # echoed to the log. Pipe-to-bash hides errors when curl returns an
      # empty body or install.sh exits early (no `set -o pipefail` in the
      # GitHub Actions step shell), and prior runs showed install.sh
      # producing ZERO output -- bash -x makes the silent failure visible.
      - name: Run install script (Unix)
        if: matrix.os != 'windows'
        env:
          RIDGE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -o pipefail
          INSTALLER=/tmp/ridge-install.sh
          echo "Fetching installer from raw.githubusercontent.com ..."
          curl -fsSL "https://raw.githubusercontent.com/ridge-lang/ridge/${{ steps.src.outputs.ref }}/tools/install/install.sh" -o "$INSTALLER"
          echo "Installer size: $(wc -c < "$INSTALLER") bytes"
          echo "First 3 lines of installer:"
          head -3 "$INSTALLER"
          echo "--- begin bash -x trace ---"
          bash -x "$INSTALLER" 2>&1
          rc=$?
          echo "--- end bash -x trace (exit=$rc) ---"
          echo "Contents of \$HOME/.cargo/bin after install:"
          ls -la "$HOME/.cargo/bin/" || echo "(directory does not exist)"
          exit $rc

      - name: Run install script (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          RIDGE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $url = "https://raw.githubusercontent.com/ridge-lang/ridge/${{ steps.src.outputs.ref }}/tools/install/install.ps1"
          & ([scriptblock]::Create((iwr -useb $url).Content))

      # ── Ensure install location is on PATH for subsequent steps ──
      # install.sh extracts to $HOME/.cargo/bin by default; the setup-rust
      # action usually adds this to PATH, but make it explicit so the verify
      # steps reliably find the binaries on every runner.
      - name: Add install dir to PATH (Unix)
        if: matrix.os != 'windows'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Add install dir to PATH (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin

      # ── Verify both binaries: pipe output through grep instead of $() ──
      # `$()` capture of native .exe output is flaky on Windows Git Bash
      # (output sometimes arrives empty). Direct pipe to grep -Fxq is
      # robust across all platforms and matches the EXACT expected line.
      - name: Verify ridge --version output
        shell: bash
        run: |
          EXPECTED="ridge ${{ steps.ver.outputs.expected }}"
          echo "Checking that 'ridge --version' prints exactly: $EXPECTED"
          ridge --version
          if ! ridge --version 2>&1 | grep -Fxq "$EXPECTED"; then
            echo "::error::ridge --version did not print the expected line '$EXPECTED'"
            exit 1
          fi
          echo "ridge --version: matches expected ✓"

      - name: Verify ridge-lsp --version output
        shell: bash
        run: |
          EXPECTED="ridge-lsp ${{ steps.ver.outputs.expected }}"
          echo "Checking that 'ridge-lsp --version' prints exactly: $EXPECTED"
          ridge-lsp --version
          if ! ridge-lsp --version 2>&1 | grep -Fxq "$EXPECTED"; then
            echo "::error::ridge-lsp --version did not print the expected line '$EXPECTED'"
            exit 1
          fi
          echo "ridge-lsp --version: matches expected ✓"

      # ── End-to-end smoke: scaffold + build a Ridge project ──
      - name: Scaffold + build smoke project
        shell: bash
        run: |
          ridge new smoke-test
          cd smoke-test
          ridge build
