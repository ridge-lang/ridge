# Postgres for trying the data examples against a real server.
#
#   docker compose up -d     start it in the background
#   docker compose down      stop it and remove the container
#
# Database, user, and password are all "app", matching the Config in the data
# guide (docs/data.md). The example under users-crud runs on SQLite by default;
# switch its connection to `connect` with this Config to run against Postgres.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
