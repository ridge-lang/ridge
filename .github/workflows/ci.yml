name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14
          - os: windows
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Skip the expensive build/test/lint cycle on changesets that only
      # touch docs, branding, examples, dogfood READMEs, the license file,
      # or community-template metadata. The job still runs (so the three
      # required status checks "Build and test (linux/macos/windows)" still
      # report success), but everything past this step short-circuits.
      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          # 'every' means a file must satisfy ALL patterns to count as a
          # match for the filter, so negations act as AND-style excludes.
          # The default 'some' would treat each pattern independently and
          # the leading `**` would mark any change as 'code'.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!assets/**'
              - '!examples/**'
              - '!dogfood/**'
              - '!LICENSE'
              - '!CHANGELOG.md'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/FUNDING.yml'
              - '!CODEOWNERS'

      - name: No code paths touched (skip build/test/lint)
        if: steps.changes.outputs.code != 'true'
        run: echo "Docs/assets-only changeset; skipping build, test, fmt, and clippy."

      - name: Free up disk space
        # GitHub-hosted Linux runners ship with ~25 GB of preinstalled
        # tooling (Android SDK, .NET, GHC, CodeQL, Boost) that Ridge does
        # not use. Rust + OTP + the cargo cache push past the remaining
        # headroom and the runner aborts with "No space left on device"
        # before the build step. Reclaim the unused space up front.
        # macOS and Windows runners have headroom; the bundled tooling
        # paths are also Linux-specific.
        if: matrix.os == 'linux' && steps.changes.outputs.code == 'true'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Install Erlang/OTP
        if: steps.changes.outputs.code == 'true'
        uses: erlef/setup-beam@v1
        with:
          # 27 is the project's minimum supported OTP: deriving (Decode) bridges
          # to the stdlib `json` module, which lands in OTP 27. The BEAM e2e job
          # below pins the floor (27) and the latest (28).
          otp-version: "27"

      - name: Cache cargo registry
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace
        if: steps.changes.outputs.code == 'true'
        run: cargo build --workspace --locked

      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        run: cargo test --workspace --no-fail-fast --locked

      - name: Check formatting
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: steps.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

  # The BEAM end-to-end suites are gated behind the `beam-runtime` feature: they
  # compile each example through the full pipeline, invoke erlc/erl on the
  # installed OTP, and assert real runtime output. The default `cargo test` in
  # build-and-test never sets the feature, so these never ran in CI before. Run
  # them on the supported OTP floor (27) and the latest (28); both must pass.
  beam-e2e:
    name: BEAM e2e (OTP ${{ matrix.otp }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!assets/**'
              - '!examples/**'
              - '!dogfood/**'
              - '!LICENSE'
              - '!CHANGELOG.md'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/FUNDING.yml'
              - '!CODEOWNERS'

      - name: Free up disk space
        if: steps.changes.outputs.code == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install Erlang/OTP
        if: steps.changes.outputs.code == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}

      - name: Cache cargo registry
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-beam-${{ matrix.otp }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-beam-${{ matrix.otp }}-

      # Bring up a TLS-enabled Postgres so the std.data Postgres adapter e2e can
      # exercise the real wire protocol — SSL upgrade and SCRAM-SHA-256 auth
      # included — against a live database. A self-signed certificate is enough
      # for sslmode=require (encrypt without certificate verification); the
      # adapter e2e skips itself when RIDGE_TEST_PG_URL is unset, so it only runs
      # here, where the URL is provided.
      - name: Start Postgres with TLS
        if: steps.changes.outputs.code == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/pgcerts"
          openssl req -new -x509 -days 365 -nodes \
            -out "$RUNNER_TEMP/pgcerts/server.crt" \
            -keyout "$RUNNER_TEMP/pgcerts/server.key" \
            -subj "/CN=localhost"
          chmod 600 "$RUNNER_TEMP/pgcerts/server.key"
          # The official postgres image runs the server as uid 999; it refuses to
          # start unless it can read the key file, so hand both certs to that uid.
          sudo chown 999:999 "$RUNNER_TEMP/pgcerts/server.key" "$RUNNER_TEMP/pgcerts/server.crt"
          docker run -d --name ridge-pg \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=ridge_test \
            -p 5432:5432 \
            -v "$RUNNER_TEMP/pgcerts:/certs:ro" \
            postgres:16 \
            -c ssl=on \
            -c ssl_cert_file=/certs/server.crt \
            -c ssl_key_file=/certs/server.key
          for i in $(seq 1 30); do
            if docker exec ridge-pg pg_isready -U postgres >/dev/null 2>&1; then
              echo "postgres ready"; break
            fi
            echo "waiting for postgres ($i)"; sleep 2
          done
          docker exec ridge-pg psql -U postgres -d ridge_test -c \
            'CREATE TABLE IF NOT EXISTS ridge_pg_users (id integer, name text, age integer);'
          docker exec ridge-pg psql -U postgres -d ridge_test -c \
            'CREATE TABLE IF NOT EXISTS ridge_pg_posts (id integer, author integer, title text);'
          docker exec ridge-pg psql -U postgres -d ridge_test -c \
            'CREATE TABLE IF NOT EXISTS ridge_pg_emps (id integer, dept text, salary integer);'

      - name: Run BEAM runtime e2e
        if: steps.changes.outputs.code == 'true'
        env:
          RIDGE_TEST_PG_URL: "postgres://postgres:postgres@localhost:5432/ridge_test?sslmode=require"
        run: cargo test -p ridge-codegen-erl -p ridge-driver -p ridge-cli --features beam-runtime --no-fail-fast --locked

  # Drive the built ridge-lsp binary against a real LSP client (Neovim,
  # headless) over stdio. The in-process replay tests cannot exercise the
  # transport, the initialize handshake against a real client, position-encoding
  # negotiation, or how a client applies what the server returns; this job does.
  # The wire-level smoke test (tests/stdio_smoke.rs) rides the build-and-test
  # job's `cargo test`, so it needs no separate step here.
  lsp-acceptance:
    name: LSP acceptance (Neovim)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!assets/**'
              - '!examples/**'
              - '!dogfood/**'
              - '!LICENSE'
              - '!CHANGELOG.md'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/FUNDING.yml'
              - '!CODEOWNERS'

      - name: No code paths touched (skip)
        if: steps.changes.outputs.code != 'true'
        run: echo "Docs/assets-only changeset; skipping LSP acceptance."

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Cache cargo registry
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build ridge-lsp
        if: steps.changes.outputs.code == 'true'
        run: cargo build -p ridge-lsp --locked

      - name: Install Neovim
        if: steps.changes.outputs.code == 'true'
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run acceptance suite
        if: steps.changes.outputs.code == 'true'
        env:
          RIDGE_LSP: ${{ github.workspace }}/target/debug/ridge-lsp
        run: bash tools/lsp-acceptance/run.sh
