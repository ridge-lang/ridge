# tools/vscode-ridge-test/ridge.toml — workspace root manifest for the
# manual VS Code diagnostics fixture.
#
# The forbid rule below makes std.fs unreachable from the vscode-diag-fixture.*
# project, triggering R013 ForbidViolation when src/Sample.ridge imports it.

[workspace]
name    = "vscode-diag-fixture-ws"
version = "0.1.0"
members = ["apps/*"]

[workspace.rules]
forbid = [
  { from = "vscode-diag-fixture.**", to = "std.fs" },
]
