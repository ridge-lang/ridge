name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14
          - os: windows
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Skip the expensive build/test/lint cycle on changesets that only
      # touch docs, branding, examples, dogfood READMEs, the license file,
      # or community-template metadata. The job still runs (so the three
      # required status checks "Build and test (linux/macos/windows)" still
      # report success), but everything past this step short-circuits.
      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          # 'every' means a file must satisfy ALL patterns to count as a
          # match for the filter, so negations act as AND-style excludes.
          # The default 'some' would treat each pattern independently and
          # the leading `**` would mark any change as 'code'.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!assets/**'
              - '!examples/**'
              - '!dogfood/**'
              - '!LICENSE'
              - '!CHANGELOG.md'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/FUNDING.yml'
              - '!CODEOWNERS'

      - name: No code paths touched (skip build/test/lint)
        if: steps.changes.outputs.code != 'true'
        run: echo "Docs/assets-only changeset; skipping build, test, fmt, and clippy."

      - name: Free up disk space
        # GitHub-hosted Linux runners ship with ~25 GB of preinstalled
        # tooling (Android SDK, .NET, GHC, CodeQL, Boost) that Ridge does
        # not use. Rust + OTP + the cargo cache push past the remaining
        # headroom and the runner aborts with "No space left on device"
        # before the build step. Reclaim the unused space up front.
        # macOS and Windows runners have headroom; the bundled tooling
        # paths are also Linux-specific.
        if: matrix.os == 'linux' && steps.changes.outputs.code == 'true'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Install Erlang/OTP
        if: steps.changes.outputs.code == 'true'
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"

      - name: Cache cargo registry
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace
        if: steps.changes.outputs.code == 'true'
        run: cargo build --workspace --locked

      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        run: cargo test --workspace --no-fail-fast --locked

      # The BEAM end-to-end suites are gated behind the `beam-runtime` feature:
      # they compile each example through the full pipeline, invoke erlc/erl on
      # the installed OTP, and assert real runtime output. The default
      # `cargo test` above never sets the feature, so without this step CI would
      # install OTP yet never exercise the BEAM. Linux only -- OTP behaviour is
      # target-agnostic here and a single platform keeps the gate fast.
      - name: Run BEAM runtime e2e (linux)
        if: matrix.os == 'linux' && steps.changes.outputs.code == 'true'
        run: cargo test -p ridge-codegen-erl -p ridge-driver -p ridge-cli --features beam-runtime --no-fail-fast --locked

      - name: Check formatting
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: steps.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
