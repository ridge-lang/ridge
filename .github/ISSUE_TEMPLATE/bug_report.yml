name: Bug report
description: Report a bug or unexpected behavior in Ridge
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form so we can help quickly.
        For security issues, see SECURITY.md — do not file a public issue.

  - type: input
    id: version
    attributes:
      label: Ridge version
      description: "Output of `ridge --version`"
      placeholder: "0.2.0-rc1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal example. Include the `.rg` source and the exact command you ran.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact error messages and stack traces.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
